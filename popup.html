<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus Mode</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <h1>Focus Mode</h1>

      <section class="card">
        <label class="row">
          <span>Enable Focus Mode</span>
          <input id="focusToggle" type="checkbox" />
        </label>
      </section>

      <section class="card">
        <h2>Pomodoro Timer</h2>
        <p id="timerDisplay" class="timer">25:00</p>
        <div class="buttonRow">
          <button id="startPauseBtn">Start</button>
          <button id="resetBtn" class="ghost">Reset</button>
        </div>
      </section>

      <section class="card">
        <h2>Quote</h2>
        <p id="quote">Discipline is choosing what you want most over what you want now.</p>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
